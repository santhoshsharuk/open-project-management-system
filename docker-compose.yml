version: '3.9'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: sqlite:///./devflow.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/devflow.db:/app/devflow.db   # persist SQLite file
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
